<html lang="de">
<head>
<meta charset="UTF-8">

<title>LK Bauservice — Einkauf</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>

:root{
  --bg:#f0f0f0;
  --sb:#ffffff;
  --sb2:#f5f5f5;
  --sb3:#ebebeb;
  --sur:#ffffff;
  --sur2:#f8f8f8;
  --brd:#d0d0d0;
  --gold:#0063b1;
  --gold2:#0078d4;
  --dark:#1a1a1a;
  --txt:#000000;
  --mut:#555555;
  --ok:#107c10;
  --err:#a4262c;
  --bl:#0063b1;
  --sb-text:#333333;
  --sb-active:#0063b1;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:"IBM Plex Sans",sans-serif;background:var(--bg);color:var(--txt);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
/* TOPBAR */
.topbar{background:#0063b1;display:flex;align-items:center;padding:0 20px;height:52px;gap:16px;flex-shrink:0;border-bottom:2px solid #004e8c;box-shadow:0 2px 4px rgba(0,0,0,.2);}
.lk-logo{width:34px;height:34px;background:linear-gradient(135deg,#004e8c,#0078d4);border-radius:3px;display:flex;align-items:center;justify-content:center;font-family:"Bebas Neue",cursive;font-size:20px;color:var(--dark);}
.logo-name{font-family:"Bebas Neue",cursive;font-size:17px;color:white;letter-spacing:2px;line-height:1;}
.logo-sub{font-size:9px;color:var(--gold);letter-spacing:3px;text-transform:uppercase;}
.tb-div{width:1px;height:28px;background:#333;margin:0 4px;}
.tb-ttl{font-family:"Bebas Neue",cursive;font-size:18px;color:#ffffff;letter-spacing:3px;}
.plz-pill{margin-left:auto;display:flex;align-items:center;gap:6px;background:#2a2a2a;border:1px solid #444;border-radius:3px;padding:4px 12px;}
.plz-lbl{font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.7);text-transform:uppercase;}
.plz-sel{background:transparent;border:none;color:#ffffff;font-family:"IBM Plex Mono",monospace;font-size:12px;outline:none;cursor:pointer;}
.plz-sel option{background:#1a1a1a;color:white;}
/* LAYOUT */
.main{display:flex;flex:1;overflow:hidden;}
/* SIDEBAR */
.sidebar{width:260px;background:#f8f8f8;border-right:1px solid #d0d0d0;flex-shrink:0;overflow-y:auto;border-right:1px solid #2a2a2a;}
.sidebar::-webkit-scrollbar{width:4px;}.sidebar::-webkit-scrollbar-thumb{background:#333;border-radius:2px;}
.tree-hdr{padding:10px 16px 8px;font-size:9px;letter-spacing:3px;color:#555555;text-transform:uppercase;border-bottom:1px solid #2a2a2a;font-family:"IBM Plex Mono",monospace;}
.tg{display:flex;align-items:center;gap:8px;padding:8px 16px;cursor:pointer;transition:background .12s;border-bottom:1px solid rgba(255,255,255,.03);}
.tg:hover{background:#e8f0fb;}.tg.open{background:#e0ecf8;}
.tg-ar{font-size:9px;color:#555;transition:transform .2s;width:10px;text-align:center;}
.tg.open .tg-ar{transform:rotate(90deg);color:var(--gold);}
.tg-ic{font-size:13px;}
.tg-lb{font-size:12px;color:#000000;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tg.open .tg-lb{color:#0063b1;font-weight:600;}
.tg-ct{font-size:10px;color:#555555;font-family:"IBM Plex Mono",monospace;}
.tc{display:none;background:#f0f4fc;}.tc.open{display:block;}
.ti{display:flex;align-items:center;gap:8px;padding:6px 16px 6px 36px;cursor:pointer;transition:background .12s;border-bottom:1px solid rgba(255,255,255,.04);}
.ti:hover{background:#d0e8ff;}.ti.active{background:#daeaff;border-left:3px solid #0063b1;padding-left:34px;}
.ti-dot{width:5px;height:5px;border-radius:50%;background:#aaaaaa;flex-shrink:0;}
.ti.active .ti-dot{background:var(--gold);}
.ti-lb{font-size:12px;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ti.active .ti-lb{color:#0063b1;font-weight:700;}
/* TABLE AREA — full height now */
.content{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.tbl-area{flex:1;overflow-y:auto;background:var(--bg);}
.tbar{display:flex;align-items:center;gap:12px;padding:9px 16px;background:var(--sur2);border-bottom:1px solid var(--brd);flex-shrink:0;}
.tbar-t{font-size:13px;font-weight:600;color:var(--dark);}
.tbar-c{font-size:11px;color:var(--mut);font-family:"IBM Plex Mono",monospace;}
.sbox{margin-left:auto;display:flex;align-items:center;gap:6px;background:white;border:1px solid var(--brd);border-radius:3px;padding:5px 10px;}
.sbox input{border:none;outline:none;font-family:"IBM Plex Sans",sans-serif;font-size:12px;width:180px;color:var(--txt);background:transparent;}
.dt{width:100%;border-collapse:collapse;font-size:12px;}
.dt th{position:sticky;top:0;background:var(--sur2);border-bottom:2px solid var(--brd);padding:8px 12px;text-align:left;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--mut);font-weight:600;white-space:nowrap;z-index:10;}
.dt td{padding:9px 12px;border-bottom:1px solid #f0ede6;vertical-align:middle;}
.dt tr:hover td{background:#f0f7ff;cursor:pointer;}
.dt tr.sel td{background:#e3efff;}
.dt tr.sel td:first-child{border-left:3px solid #0054a3;padding-left:9px;}
.nc{font-weight:500;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.dc{font-size:11px;color:var(--mut);max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pc-cell{font-family:"IBM Plex Mono",monospace;font-size:12px;color:var(--bl);font-weight:600;text-align:right;white-space:nowrap;}
.sc{font-size:11px;color:var(--mut);max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ac{font-family:"IBM Plex Mono",monospace;font-size:10px;color:#bbb;}
.lws-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#5a9a5a;margin-right:5px;vertical-align:middle;}
/* OVERLAY PANEL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:none;align-items:stretch;}
.overlay.open{display:flex;}
.panel{background:var(--sur);width:calc(100% - 260px);margin-left:260px;display:flex;flex-direction:column;overflow:hidden;animation:slideIn .2s ease;}
@keyframes slideIn{from{transform:translateX(30px);opacity:0;}to{transform:translateX(0);opacity:1;}}
.panel-top{background:#0063b1;padding:0 20px;height:52px;display:flex;align-items:center;gap:16px;border-bottom:2px solid var(--gold);flex-shrink:0;}
.panel-item-name{font-family:"IBM Plex Sans",sans-serif;font-weight:700;font-size:15px;color:#000000;flex:1;}
.panel-item-sub{font-size:11px;color:#555555;margin-top:2px;}
.panel-price-badge{background:rgba(200,168,75,.15);border:1px solid var(--gold);border-radius:3px;padding:4px 12px;font-family:"IBM Plex Mono",monospace;font-size:13px;color:var(--gold);font-weight:700;}
.close-btn{background:transparent;border:1px solid #444;color:#888;width:30px;height:30px;border-radius:3px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.close-btn:hover{border-color:var(--err);color:var(--err);}
/* TABS inside panel */
.ptabs{display:flex;background:var(--sur2);border-bottom:1px solid var(--brd);flex-shrink:0;}
.ptab{padding:10px 22px;font-size:12px;font-weight:500;color:var(--mut);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;white-space:nowrap;}
.ptab.active{color:#0063b1;border-bottom-color:#0063b1;background:white;}
.ptab:hover:not(.active){color:var(--dark);}
.pc{flex:1;overflow-y:auto;padding:16px 20px;}
.pc::-webkit-scrollbar{width:5px;}.pc::-webkit-scrollbar-thumb{background:#ddd;border-radius:3px;}
/* CARDS */
.nosel{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--mut);gap:8px;}
.nosel-ic{font-size:32px;opacity:.3;}
.ldrow{display:flex;align-items:center;gap:12px;padding:20px 0;color:var(--mut);font-size:13px;}
.spin{width:20px;height:20px;border:2px solid var(--brd);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.pbw{flex:1;height:3px;background:var(--brd);border-radius:2px;overflow:hidden;}
.pb{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));width:0%;transition:width .5s ease;border-radius:2px;}
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px;}
.scard{background:white;border:1px solid var(--brd);border-radius:5px;padding:14px 16px;position:relative;transition:border-color .15s,box-shadow .15s;}
.scard:hover{border-color:#0063b1;box-shadow:0 2px 8px rgba(0,99,177,.15);}
.scard.best{border-color:#0063b1;border-left:3px solid #0063b1;}
.srank{position:absolute;top:10px;right:12px;font-size:9px;letter-spacing:1px;color:var(--mut);font-family:"IBM Plex Mono",monospace;}
.srank.br{color:var(--gold);font-weight:700;}
.sname{font-weight:700;font-size:14px;color:var(--dark);margin-bottom:3px;padding-right:90px;}
.styp{font-size:10px;color:var(--mut);margin-bottom:8px;}
.prod-block{font-size:11px;font-weight:600;color:#1a1a1a;margin:6px 0 3px;padding:5px 9px;background:#f8f6f1;border-radius:3px;border-left:2px solid var(--bl);}
.prod-art{font-size:10px;color:#999;font-family:"IBM Plex Mono",monospace;margin-bottom:7px;}
.smets{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;align-items:center;}
.smet{background:var(--sur2);border-radius:2px;padding:3px 7px;font-size:10px;font-family:"IBM Plex Mono",monospace;}
.smet.pr{color:var(--bl);font-weight:700;background:rgba(44,95,138,.1);font-size:12px;}
.smet.qg{color:var(--ok);background:rgba(45,122,79,.08);}
.smet.qo{color:#e67e22;background:rgba(230,126,34,.08);}
.smet.dl{color:var(--mut);}
.delta-ok{display:inline-flex;align-items:center;gap:3px;background:rgba(45,122,79,.1);border:1px solid rgba(45,122,79,.3);color:var(--ok);font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;}
.delta-bad{display:inline-flex;align-items:center;gap:3px;background:rgba(192,57,43,.08);border:1px solid rgba(192,57,43,.2);color:var(--err);font-size:11px;padding:2px 8px;border-radius:10px;}
.delta-eq{display:inline-flex;align-items:center;gap:3px;background:var(--sur2);color:var(--mut);font-size:11px;padding:2px 8px;border-radius:10px;}
.vort{font-size:11px;color:#555;margin-bottom:8px;line-height:1.4;}
.sacts{display:flex;gap:6px;padding-top:10px;border-top:1px solid var(--brd);flex-wrap:wrap;}
.sbtn{display:flex;align-items:center;gap:4px;font-size:10px;padding:5px 10px;border-radius:3px;cursor:pointer;transition:all .12s;border:1px solid var(--brd);background:transparent;color:var(--mut);font-family:"IBM Plex Sans",sans-serif;text-decoration:none;}
.sbtn:hover{border-color:var(--gold);color:var(--gold);}
.sbtn.gb:hover{border-color:var(--bl);color:var(--bl);}
.aitip{background:linear-gradient(135deg,#fffbeb,#fff9e0);border:1px solid #e8c96a;border-radius:4px;padding:11px 14px;font-size:12px;color:#7a5c00;margin-bottom:14px;line-height:1.7;}
/* PRICE COMPARISON BAR */
.price-compare{background:white;border:1px solid var(--brd);border-radius:5px;padding:16px 20px;margin-bottom:16px;}
.price-compare-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--mut);margin-bottom:12px;font-weight:600;}
.price-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:12px;}
.price-bar-name{width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500;}
.price-bar-wrap{flex:1;height:18px;background:#f0ede6;border-radius:2px;overflow:hidden;position:relative;}
.price-bar-fill{height:100%;border-radius:2px;transition:width .6s ease;display:flex;align-items:center;padding-left:6px;}
.price-bar-val{font-family:"IBM Plex Mono",monospace;font-size:10px;font-weight:700;color:white;white-space:nowrap;}
.price-bar-delta{font-size:10px;width:90px;text-align:right;font-family:"IBM Plex Mono",monospace;}
/* INFO TAB */
.itbl{width:100%;border-collapse:collapse;font-size:12px;}
.itbl td{padding:8px 10px;border-bottom:1px solid #f5f3ee;}
.itbl td:first-child{color:var(--mut);font-size:11px;width:140px;}
/* WELCOME */
.wstate{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:10px;color:var(--mut);padding:40px;}
.wstate .wi{font-size:48px;opacity:.2;}
.wstate .wt{font-size:16px;font-weight:600;color:#bbb;}
.wstate .ws{font-size:12px;text-align:center;max-width:300px;line-height:1.6;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--sur2);}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px;}

</style>
</head>

var curItems=[],selItem=null,curTab='main';

function buildTree(){
  var root=document.getElementById('treeRoot');
  root.innerHTML='';
  Object.entries(DB).forEach(function(ge){
    var gn=ge[0],g=ge[1];
    var tot=Object.values(g.children).reduce(function(s,c){return s+c.items.length;},0);
    // Group header
    var gDiv=document.createElement('div');
    gDiv.className='tg';
    gDiv.innerHTML='<span class="tg-ar">&#9658;</span><span class="tg-ic">'+g.icon+'</span><span class="tg-lb">'+gn+'</span><span class="tg-ct">'+tot+'</span>';
    gDiv.addEventListener('click',function(){togG(gDiv);});
    // Children
    var cDiv=document.createElement('div');
    cDiv.className='tc';
    Object.entries(g.children).forEach(function(ce){
      var cn=ce[0],ch=ce[1];
      var ti=document.createElement('div');
      ti.className='ti';
      ti.innerHTML='<span class="ti-dot"></span><span class="ti-lb">'+ch.icon+' '+cn+'</span>';
      ti.addEventListener('click',function(e){e.stopPropagation();loadG(ti,cn,gn);});
      cDiv.appendChild(ti);
    });
    var wrapper=document.createElement('div');
    wrapper.appendChild(gDiv);
    wrapper.appendChild(cDiv);
    root.appendChild(wrapper);
  });
}

function togG(el){
  el.classList.toggle('open');
  el.nextElementSibling.classList.toggle('open');
}

function loadG(el,cn,gn){
  document.querySelectorAll('.ti').forEach(function(i){i.classList.remove('active');});
  el.classList.add('active');
  var ch=DB[gn].children[cn];
  if(!ch)return;
  curItems=ch.items; selItem=null;
  document.getElementById('ws').style.display='none';
  document.getElementById('tc').style.display='block';
  document.getElementById('tttl').textContent=ch.icon+' '+cn;
  document.getElementById('tcnt').textContent=ch.items.length+' Positionen';
  document.getElementById('tsearch').value='';
  renderT(ch.items);
}

function renderT(items){
  var tb=document.getElementById('tbody');
  tb.innerHTML='';
  items.forEach(function(item){
    var tr=document.createElement('tr');
    var hasCat=item.catalog&&item.catalog.length>0;
    var dot=hasCat?'<span class="lws-dot" title="є в каталозі LWS"></span>':'';
    tr.innerHTML='<td class="nc">'+dot+item.n+'</td>'
      +'<td class="dc">'+item.d+'</td>'
      +'<td class="ac">'+(item.a||'—')+'</td>'
      +'<td class="pc-cell">'+(item.p?'€'+item.p.toFixed(2):'—')+'</td>'
      +'<td class="sc">'+(item.l||'—')+'</td>';
    tr.addEventListener('click',function(){openPanel(item,tr);});
    tb.appendChild(tr);
  });
}

function filterT(){
  var q=document.getElementById('tsearch').value.toLowerCase();
  renderT(curItems.filter(function(i){
    return (i.n||'').toLowerCase().includes(q)
      ||(i.d||'').toLowerCase().includes(q)
      ||(i.a||'').toLowerCase().includes(q);
  }));
}

function openPanel(item,tr){
  document.querySelectorAll('#tbody tr').forEach(function(r){r.classList.remove('sel');});
  tr.classList.add('sel');
  selItem=item;
  document.getElementById('panelName').textContent=item.n;
  document.getElementById('panelSub').textContent=item.d+(item.a?' · Арт: '+item.a:'');
  document.getElementById('panelPrice').innerHTML=item.p?'&euro;'+item.p.toFixed(2)+' <span style="font-size:9px;opacity:.6">1С</span>':'без ціни';
  document.querySelectorAll('.ptab').forEach(function(t){t.classList.remove('active');});
  document.querySelector('.ptab').classList.add('active');
  curTab='main';
  document.getElementById('overlay').classList.add('open');
  loadTab('main');
}

function closeOverlay(){
  document.getElementById('overlay').classList.remove('open');
}

function closePanelClick(e){
  if(e.target===document.getElementById('overlay')) closeOverlay();
}

function swTab(tab,el){
  curTab=tab;
  document.querySelectorAll('.ptab').forEach(function(t){t.classList.remove('active');});
  el.classList.add('active');
  loadTab(tab);
}

function loadTab(t){
  if(t==='main') doMain();
  else if(t==='cat') doCat();
  else if(t==='ai') doAI();
  else doInfo();
}

function doCat(){
  var item=selItem;
  var pc=document.getElementById('pc');
  if(!item.catalog||!item.catalog.length){
    pc.innerHTML='<div class="nosel"><div class="nosel-ic">📋</div><p style="font-size:12px;text-align:center">Каталог LWS для цієї позиції не заповнений</p></div>';

  var wrap=document.createElement('div');
  if(item.lws_req){

    req.style.cssText='background:#e8f4e8;border:1px solid #5a9a5a;border-radius:4px;padding:9px 14px;margin-bottom:14px;font-size:12px;color:#2d5a2d';

    wrap.appendChild(req);
  }
  var grid=document.createElement('div');
  grid.className='sgrid';
  item.catalog.forEach(function(s,i){
    var card=document.createElement('div');
    card.className='scard'+(i===0?' best':'');
    var rankEl=document.createElement('span');
    rankEl.className='srank'+(i===0?' br':'');
    rankEl.textContent='LWS #'+(i+1);
    card.appendChild(rankEl);
    var inner='<div class="sname">📋 '+s.name+'</div>'
      +'<div class="styp">'+(s.typ||'Каталог LWS')+'</div>';
    if(s.artikul) inner+='<div class="prod-block">'+s.artikul+'</div>';
    inner+='<div class="smets">'+(s.preis?'<span class="smet pr">€'+s.preis.toFixed(2)+' / '+(s.einheit||'од')+'</span>':'<span class="smet dl">ціна за запитом</span>')+'</div>';
    if(s.note) inner+='<div class="vort">ℹ '+s.note+'</div>';
    inner+='<div class="sacts" id="catActs'+i+'"></div>';
    card.innerHTML+=inner;
    grid.appendChild(card);
    // Add buttons after DOM insert
    setTimeout(function(si,scard,ss){
      var a=scard.querySelector('#catActs'+si);
      if(!a)return;
      if(ss.web){var lnk=document.createElement('a');lnk.className='sbtn';lnk.textContent='🌐 Сайт';lnk.href='https://'+ss.web;lnk.target='_blank';a.appendChild(lnk);}

      bq.addEventListener('click',function(){cpyA(ss.name,item.d);});
      a.appendChild(bq);
    },0,i,card,s);
  });
  wrap.appendChild(grid);
  pc.innerHTML='';
  pc.appendChild(wrap);
}

function animP(){
  var steps=[[15,'Аналіз товару...'],[40,'Пошук постачальників...'],[65,'Порівняння цін...'],[85,'Формування рекомендації...']];
  var i=0;
  var go=function(){
    var b=document.getElementById('pbr'),t=document.getElementById('ltxt');
    if(!b)return;
    if(i<steps.length){b.style.width=steps[i][0]+'%';if(t)t.textContent=steps[i][1];i++;setTimeout(go,700);}
  };
  setTimeout(go,200);
}

async function doAI(){
  if(!selItem)return;
  var item=selItem;
  var plzL=document.getElementById('plzSel').selectedOptions[0].text;
  var plz=document.getElementById('plzSel').value;
  var pc=document.getElementById('pc');
  pc.innerHTML='<div class="ldrow"><div class="spin"></div><span id="ltxt">Gemini шукає реальні альтернативи...</span><div class="pbw"><div class="pb" id="pbr"></div></div></div>';
  animP();

  var sysMsg="You are a procurement expert for German construction. Use google_search to find REAL alternative products from DIFFERENT manufacturers. NEVER invent prices or article numbers. Return ONLY valid JSON. All text in Ukrainian.";

  var lines=[
    "Du bist Einkaufsexperte für die deutsche Baubranche.",
    "Suche mit google_search nach ECHTEN Alternativen zu diesem Produkt von ANDEREN Herstellern:",
    "Produkt: "+item.d,
    "Aktuelle Preis: "+(item.p||"?")+" EUR bei "+(item.l||"unbekannt"),
    "Region: "+plzL+", PLZ: "+plz,
    "",
    "Für jeden Alternativ-Hersteller:",
    "1. Suche auf der OFFIZIELLEN Herstellerwebseite nach dem genauen Artikelnummer (z.B. brillux.de, caparol.de, alpina.de)",
    "2. Suche nach dem aktuellen Preis bei einem deutschen Onlineshop",
    "3. Finde die direkte Produktseite URL",
    "",
    "WICHTIG: Nur Produkte mit Nassabriebklasse 3, weiß, matt - die gleiche Qualitätsstufe!",
    "Wenn Artikelnummer nicht gefunden: null",
    "Wenn Preis nicht gefunden: null",
    "ALLE Texte auf UKRAINISCH.",
    "",
    "Antworte NUR mit JSON:",
    '{"ai_tip":"порада українською: який постачальник найкращий і чому","lieferanten":[{"hersteller":"виробник","produkt_name":"точна назва з сайту виробника","ean":"EAN або null","artikul":"артикул з офіційного сайту виробника або null","preis_brutto":null,"preis_netto":null,"einheit":"12,5L","produkt_url":"пряме посилання на товар або null","shop_name":"де знайшов ціну","kontakt_email":null,"kontakt_form":null,"lieferzeit":"термін або null","vorteil":"перевага українською","nassabrieb":"3"}]}'
  ];

  try{
    var resp=await fetch("/api/search",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({userMsg:lines.join("\n"),systemMsg:sysMsg,type:"ai"})
    })
    var gdata=await resp.json();
    if(!resp.ok) throw new Error(gdata.error||"HTTP "+resp.status);
    var txt=gdata.text||"";
    txt=txt.replace(/```json|```/g,"").trim();
    var j1=txt.indexOf("{"),j2=txt.lastIndexOf("}");
    if(j1>=0&&j2>=0) txt=txt.slice(j1,j2+1);
    else throw new Error("JSON не знайдено у відповіді AI");
    var parsed;
    try{ parsed=JSON.parse(txt); }
    catch(pe){
      // Try to fix common JSON issues
      txt=txt.replace(/,\s*}/g,'}').replace(/,\s*]/g,']');
      parsed=JSON.parse(txt);
    }
    renderS(parsed,item);
  }catch(err){
    pc.innerHTML='<div style="padding:20px"><p style="color:var(--err)">'+err.message+'</p>'
      +'<button id="retryBtn" style="margin-top:12px;padding:7px 18px;background:var(--gold);border:none;border-radius:3px;cursor:pointer;font-size:12px;font-family:inherit;font-weight:600">Повторити</button></div>';
    var rb=document.getElementById('retryBtn');
    if(rb) rb.addEventListener('click',doAI);
  }
}

  var suppliers = data.lieferanten||[];
  var pc = document.getElementById('pc');
  var wrap = document.createElement('div');

  // AI TIP
  var tip = document.createElement('div');
  tip.className = 'aitip';
  tip.innerHTML = '&#128269; <strong>Реальний пошук:</strong> '+(data.ai_tip||'—')
    +'<div style="font-size:10px;color:var(--ok);margin-top:5px">&#10003; Дані отримані через веб-пошук — ціни та посилання реальні</div>';
  wrap.appendChild(tip);

  // PRICE BAR
  if(curP>0 && suppliers.length>0){
    var vals = suppliers.filter(function(s){return s.preis_brutto>0;}).map(function(s){return s.preis_brutto;});
    if(vals.length>0){
      var maxP = Math.max.apply(null, vals.concat([curP])) * 1.15;
      var cmp = document.createElement('div');
      cmp.className = 'price-compare';
      cmp.innerHTML = '<div class="price-compare-title">&#128202; Порівняння цін (поточна vs знайдені)</div>';

      // current
      var cw = Math.round((curP/maxP)*100);
      var row0 = document.createElement('div');
      row0.className = 'price-bar-row';
      row0.innerHTML = '<div class="price-bar-name" style="font-weight:700;color:var(--bl)">&#128312; 1С &mdash; '+(item.l||'поточний')+'</div>'
        +'<div class="price-bar-wrap"><div class="price-bar-fill" style="width:'+cw+'%;background:var(--bl)">'
        +'<span class="price-bar-val">&euro;'+curP.toFixed(2)+'</span></div></div>'
        +'<div class="price-bar-delta" style="color:var(--bl);font-weight:700">поточна</div>';
      cmp.appendChild(row0);

      suppliers.forEach(function(s){
        if(!s.preis_brutto) return;
        var w = Math.round((s.preis_brutto/maxP)*100);
        var diff = s.preis_brutto - curP;
        var pct = Math.round((diff/curP)*100);
        var color = pct<0?'var(--ok)':pct>0?'var(--err)':'var(--mut)';
        var bg = pct<0?'#2d7a4f':pct>0?'#c0392b':'#888';
        var dStr = pct<0?'&#9660; '+Math.abs(pct)+'% дешевше':pct>0?'&#9650; +'+pct+'% дорожче':'= однак.';
        var row = document.createElement('div');
        row.className = 'price-bar-row';
        row.innerHTML = '<div class="price-bar-name">'+s.hersteller+'</div>'
          +'<div class="price-bar-wrap"><div class="price-bar-fill" style="width:'+w+'%;background:'+bg+'">'
          +'<span class="price-bar-val">&euro;'+parseFloat(s.preis_brutto||0).toFixed(2)+'</span></div></div>'
          +'<div class="price-bar-delta" style="color:'+color+';font-weight:700">'+dStr+'</div>';
        cmp.appendChild(row);
      });
      wrap.appendChild(cmp);
    }
  }

  // SUPPLIER CARDS
  var grid = document.createElement('div');
  grid.className = 'sgrid';

  suppliers.forEach(function(s,i){
    var card = document.createElement('div');
    card.className = 'scard'+(i===0?' best':'');

    // Rank
    var rank = document.createElement('span');
    rank.className = 'srank'+(i===0?' br':'');
    rank.textContent = i===0?'★ НАЙКРАЩЕ':'#'+(i+1);
    card.appendChild(rank);

    // Price delta badge
    var deltaBadge = '';
    if(curP>0 && s.preis_brutto>0){
      var d2 = s.preis_brutto - curP;
      var p2 = Math.round((d2/curP)*100);
      if(p2<0) deltaBadge='<span class="delta-ok">&#9660; '+Math.abs(p2)+'% дешевше</span>';
      else if(p2>0) deltaBadge='<span class="delta-bad">&#9650; +'+p2+'% дорожче</span>';
      else deltaBadge='<span class="delta-eq">= однакова ціна</span>';
    }

    // Inner HTML
    var inner = '<div class="sname">&#127981; '+s.hersteller+'</div>'
      +'<div class="styp">'+(s.nassabrieb?'Nassabrieb Kl.'+s.nassabrieb:'')+'</div>';

    // Product block
    inner += '<div class="prod-block">'+s.produkt_name+'</div>';

    // EAN / Artikul
    var artLine = '';
    if(s.ean) artLine += 'EAN: '+s.ean;
    if(s.artikul) artLine += (artLine?' &nbsp;|&nbsp; ':'')+'Арт: '+s.artikul;
    if(artLine) inner += '<div class="prod-art">'+artLine+'</div>';
    else inner += '<div class="prod-art" style="color:#e67e22">&#9888; артикул не знайдено</div>';

    // Metrics
    inner += '<div class="smets">';
    if(s.preis_brutto){
      inner += '<span class="smet pr">&euro;'+parseFloat(s.preis_brutto||0).toFixed(2)+' brutto';
      if(s.preis_netto) inner += ' / &euro;'+s.preis_netto.toFixed(2)+' netto';
      inner += ' / '+s.einheit+'</span>';
      if(deltaBadge) inner += deltaBadge;
    } else {
      inner += '<span class="smet dl" style="color:#e67e22">&#9888; ціна невідома &mdash; уточни</span>';
    }
    if(s.shop_name) inner += '<span class="smet dl">&#128722; '+s.shop_name+'</span>';
    if(s.lieferzeit) inner += '<span class="smet dl">&#128336; '+s.lieferzeit+'</span>';
    inner += '</div>';

    if(s.vorteil) inner += '<div class="vort">&#10003; '+s.vorteil+'</div>';

    // ACTION BUTTONS area
    inner += '<div class="sacts" id="acts'+i+'"></div>';

    card.innerHTML += inner;
    grid.appendChild(card);

    // Add buttons safely after DOM insert
    setTimeout(function(si, sc, ss){
      var acts = sc.querySelector('#acts'+si);
      if(!acts) return;

      // Product page link
      if(ss.produkt_url){
        var lnk = document.createElement('a');
        lnk.className = 'sbtn';
        lnk.style.cssText = 'background:rgba(200,168,75,.1);border-color:var(--gold);color:var(--gold)';
        lnk.innerHTML = '&#128279; Сторінка товару';
        lnk.href = ss.produkt_url;
        lnk.target = '_blank';
        acts.appendChild(lnk);
      }

      // Contact form
      if(ss.kontakt_form){
        var cf = document.createElement('a');
        cf.className = 'sbtn';
        cf.innerHTML = '&#128203; B2B запит';
        cf.href = ss.kontakt_form;
        cf.target = '_blank';
        acts.appendChild(cf);
      }

      // Copy email inquiry
      var mailBtn = document.createElement('button');
      mailBtn.className = 'sbtn';
      mailBtn.innerHTML = '&#9993; Лист скопіювати';
      mailBtn.addEventListener('click', function(){
        buildAndCopyMail(ss, item);
      });
      acts.appendChild(mailBtn);

      // Open mailto if email known
      if(ss.kontakt_email){
        var mailLink = document.createElement('a');
        mailLink.className = 'sbtn gb';
        mailLink.innerHTML = '&#128231; '+ss.kontakt_email;
        mailLink.href = 'mailto:'+ss.kontakt_email
          +'?subject=Angebotsanfrage '+encodeURIComponent(ss.produkt_name)
          +'&body='+encodeURIComponent(buildMailText(ss, item));
        acts.appendChild(mailLink);
      }

    }, 0, i, card, s);
  });

  wrap.appendChild(grid);
  pc.innerHTML = '';
  pc.appendChild(wrap);
}

function buildMailText(s, item){
  var plzL = document.getElementById('plzSel').selectedOptions[0].text;
  return "Sehr geehrte Damen und Herren,\n\n"
    + "wir sind LK Bauservice GmbH, ein Bauunternehmen aus der Region " + plzL + ".\n"
    + "Wir interessieren uns für folgendes Produkt:\n\n"
    + "Produkt: " + s.produkt_name + "\n"
    + (s.ean ? "EAN: " + s.ean + "\n" : "")
    + (s.artikul ? "Artikelnummer: " + s.artikul + "\n" : "")
    + "\nWir bitten um folgende Informationen:\n"
    + "- Netto-Preis pro Einheit für gewerbliche Kunden\n"
    + "- Staffelpreise ab 10, 50, 100 Einheiten\n"
    + "- Lieferzeit in die Region " + plzL + "\n"
    + "- Mindestbestellmenge\n"
    + "- Zahlungskonditionen / Skonto\n\n"
    + "Wir verwalten mehrere Baustellen pro Jahr und suchen einen zuverlässigen Lieferanten.\n\n"
    + "Mit freundlichen Grüßen\n"
    + "LK Bauservice GmbH\n"
    + "Einkaufsabteilung";
}

function buildAndCopyMail(s, item){
  var txt = buildMailText(s, item);
  navigator.clipboard.writeText(txt).then(function(){
    alert('Лист скопійовано!\n\nВідправ на: ' + (s.kontakt_email||'знайди контакт на сайті постачальника'));
  });
}

  var item=selItem;

  pc.innerHTML='<div style="display:flex;gap:20px;flex-wrap:wrap">'

    +'</div></div>';

  var sysMsg="You are a construction materials expert. Respond ONLY with valid JSON. All values in Ukrainian. No double quotes inside strings.";
  var lines2=[
    "Product: "+item.d+" ("+item.n+")",
    "Article: "+(item.a||"unknown"),
    "Return ONLY JSON (all values in Ukrainian):",
    '{"pryznachennya":"purpose","vlastyvosti":["p1","p2","p3","p4","p5"],"zastosuvannya":"how to apply","norma_vytrat":"consumption","zberigannya":"storage","uvaga":"warning or empty"}'
  ];

  try{
    var resp2=await fetch("/api/search",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({userMsg:lines2.join("\n"),systemMsg:sysMsg,type:"info"})
    })
    var gd2=await resp2.json();
    if(!resp2.ok) throw new Error(gd2.error||"HTTP "+resp2.status);
    var t2=gd2.text||"";
    t2=t2.replace(/```json|```/g,"").trim();
    var ji=t2.indexOf("{"),je=t2.lastIndexOf("}");
    if(ji>=0&&je>=0) t2=t2.slice(ji,je+1);
    else throw new Error("JSON не знайдено");
    var info;
    try{ info=JSON.parse(t2); }
    catch(pe){
      t2=t2.replace(/,\s*}/g,'}').replace(/,\s*]/g,']');
      info=JSON.parse(t2);
    }
    var desc=document.getElementById('infoDesc');
    if(!desc)return;
    var h='<div style="background:#fffbeb;border:1px solid #e8c96a;border-radius:4px;padding:11px 14px;margin-bottom:12px">'
      +'<div style="font-size:10px;letter-spacing:2px;color:#b8860b;text-transform:uppercase;margin-bottom:5px">Призначення</div>'
      +'<div style="font-size:12px;color:#3a3000;line-height:1.7">'+(info.pryznachennya||"—")+'</div></div>';
    if(info.vlastyvosti&&info.vlastyvosti.length){
      h+='<div style="background:white;border:1px solid var(--brd);border-radius:4px;padding:11px 14px;margin-bottom:12px">'
        +'<div style="font-size:10px;letter-spacing:2px;color:var(--mut);text-transform:uppercase;margin-bottom:8px">Властивості</div>'
        +'<div style="display:flex;flex-wrap:wrap;gap:6px">';
      info.vlastyvosti.forEach(function(v){
        h+='<span style="background:#f0ede6;border-radius:3px;padding:4px 9px;font-size:11px;color:#444">✓ '+v+'</span>';
      });
      h+='</div></div>';
    }
    h+='<table class="itbl">';
    if(info.zastosuvannya) h+='<tr><td>Застосування</td><td>'+info.zastosuvannya+'</td></tr>';
    if(info.norma_vytrat)  h+='<tr><td>Витрата</td><td><strong>'+info.norma_vytrat+'</strong></td></tr>';
    if(info.zberigannya)   h+='<tr><td>Зберігання</td><td>'+info.zberigannya+'</td></tr>';
    if(info.uvaga)         h+='<tr><td>⚠ Увага</td><td style="color:var(--err)">'+info.uvaga+'</td></tr>';
    h+='</table>';
    desc.innerHTML=h;
  }catch(err2){
    var d=document.getElementById('infoDesc');
    if(d) d.innerHTML='<p style="color:var(--err);font-size:12px">'+err2.message+'</p>';
  }
}

// ═══════════════════════════════════
// TRACKER
// ═══════════════════════════════════
var TRACKER_KEY = 'lk_tracker_v1';
var editingId = null;
var MONO = "font-family:'IBM Plex Mono',monospace";

var STATUS_MAP = {
  sent:       {label:'\u2709\uFE0F Очікую відповідь', cls:'st-sent'},
  replied:    {label:'\u2705 Відповіли', cls:'st-replied'},
  negotiating:{label:'\uD83D\uDCAC Переговори', cls:'st-negotiating'},
  accepted:   {label:'\uD83C\uDFC6 Прийнято', cls:'st-accepted'},
  rejected:   {label:'\u274C Відмова', cls:'st-rejected'},
  noresponse: {label:'\uD83D\uDE10 Не відповіли', cls:'st-noresponse'}
};

function getEntries(){
  try{ return JSON.parse(localStorage.getItem(TRACKER_KEY)||'[]'); }
  catch(e){ return []; }
}

function saveEntries(arr){
  localStorage.setItem(TRACKER_KEY, JSON.stringify(arr));
}

function openTrackerFull(){
  document.getElementById('trackerOverlay').classList.add('open');
  renderTracker();
}

function closeTracker(){
  document.getElementById('trackerOverlay').classList.remove('open');
}

function closeTrackerClick(e){
  if(e.target===document.getElementById('trackerOverlay')) closeTracker();
}

function renderTracker(){
  var tc = document.getElementById('trackerContent');
  var entries = getEntries();

  if(!entries.length){
    tc.innerHTML = '<div class="tracker-empty">'
      +'<div style="font-size:40px;opacity:.2">&#128202;</div>'
      +'<p style="font-size:14px;font-weight:600;color:#bbb">Записів немає</p>'
      +'<p style="font-size:12px">Натисни "+ Додати запис" щоб почати</p>'
      +'</div>';
    return;
  }

  var total = entries.length;
  var replied = entries.filter(function(e){return e.status==='replied'||e.status==='negotiating'||e.status==='accepted';}).length;
  var accepted = entries.filter(function(e){return e.status==='accepted';}).length;
  var waiting = entries.filter(function(e){return e.status==='sent';}).length;

  var statBox = 'background:white;border:1px solid var(--brd);border-radius:4px;padding:10px 18px;flex:1;min-width:100px';
  var html = '<div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap">'
    +'<div style="'+statBox+'">'
    +'<div style="font-size:10px;letter-spacing:2px;color:var(--mut);text-transform:uppercase">Всього</div>'
    +'<div style="font-size:24px;font-weight:700;'+MONO+'">'+total+'</div></div>'
    +'<div style="background:rgba(44,95,138,.05);border:1px solid rgba(44,95,138,.2);border-radius:4px;padding:10px 18px;flex:1;min-width:100px">'
    +'<div style="font-size:10px;letter-spacing:2px;color:var(--bl);text-transform:uppercase">Чекаю</div>'
    +'<div style="font-size:24px;font-weight:700;'+MONO+';color:var(--bl)">'+waiting+'</div></div>'
    +'<div style="background:rgba(45,122,79,.05);border:1px solid rgba(45,122,79,.2);border-radius:4px;padding:10px 18px;flex:1;min-width:100px">'
    +'<div style="font-size:10px;letter-spacing:2px;color:var(--ok);text-transform:uppercase">Відповіли</div>'
    +'<div style="font-size:24px;font-weight:700;'+MONO+';color:var(--ok)">'+replied+'</div></div>'
    +'<div style="background:rgba(200,168,75,.08);border:1px solid rgba(200,168,75,.3);border-radius:4px;padding:10px 18px;flex:1;min-width:100px">'
    +'<div style="font-size:10px;letter-spacing:2px;color:var(--gold);text-transform:uppercase">Прийнято</div>'
    +'<div style="font-size:24px;font-weight:700;'+MONO+';color:var(--gold)">'+accepted+'</div></div>'
    +'</div>';

  html += '<div style="background:white;border:1px solid var(--brd);border-radius:4px;overflow:auto">'
    +'<table class="tracker-table"><thead><tr>'
    +'<th>Дата</th><th>Позиція</th><th>Постачальник</th><th>Продукт / Арт.</th>'
    +'<th style="text-align:right">Ціна &euro;</th><th>Статус</th><th>Примітка</th><th></th>'
    +'</tr></thead><tbody>';

  var sorted = entries.slice().sort(function(a,b){return (b.date||'').localeCompare(a.date||'');});

  sorted.forEach(function(e){
    var st = STATUS_MAP[e.status]||{label:e.status,cls:'st-sent'};
    var priceStr = e.price
      ? '<span style="'+MONO+';font-weight:700;color:var(--bl)">&euro;'+parseFloat(e.price).toFixed(2)+'</span>'
      : '<span style="color:#ddd">&mdash;</span>';
    var emailBtn = e.email
      ? '<a href="mailto:'+e.email+'" style="font-size:12px;color:var(--bl);text-decoration:none;margin-right:4px" title="'+e.email+'">&#128231;</a>'
      : '';
    var eid = e.id;
    html += '<tr>'
      +'<td style="'+MONO+';font-size:10px;color:var(--mut);white-space:nowrap">'+formatDate(e.date)+'</td>'
      +'<td style="font-weight:500;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+e.position+'">'+e.position+'</td>'
      +'<td style="font-weight:600">'+e.supplier+'</td>'
      +'<td style="font-size:11px;color:var(--mut);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+(e.product||'')+'">'+( e.product||'&mdash;')+'</td>'
      +'<td style="text-align:right">'+priceStr+'</td>'
      +'<td><span class="status-badge '+st.cls+'">'+st.label+'</span></td>'
      +'<td style="font-size:11px;color:var(--mut);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+emailBtn+(e.note||'&mdash;')+'</td>'
      +'<td style="white-space:nowrap" id="acts_'+eid+'"></td>'
      +'</tr>';
  });

  html += '</tbody></table></div>';
  tc.innerHTML = html;

  // Add buttons after render
  sorted.forEach(function(e){
    var cell = document.getElementById('acts_'+e.id);
    if(!cell) return;
    var editBtn = document.createElement('button');
    editBtn.innerHTML = '&#9998;';
    editBtn.style.cssText = 'background:none;border:1px solid var(--brd);border-radius:2px;padding:3px 7px;cursor:pointer;font-size:11px;color:var(--mut);margin-right:4px';
    editBtn.addEventListener('click', function(){ editEntry(e.id); });
    var delBtn = document.createElement('button');
    delBtn.innerHTML = '&#10005;';
    delBtn.style.cssText = 'background:none;border:1px solid rgba(192,57,43,.3);border-radius:2px;padding:3px 7px;cursor:pointer;font-size:11px;color:var(--err)';
    delBtn.addEventListener('click', function(){ deleteEntry(e.id); });
    cell.appendChild(editBtn);
    cell.appendChild(delBtn);
  });
}

function formatDate(d){
  if(!d) return '&mdash;';
  try{ return new Date(d).toLocaleDateString('de',{day:'2-digit',month:'2-digit',year:'2-digit'}); }
  catch(ex){ return d; }
}

function openAddEntry(prefill){
  editingId = null;
  document.getElementById('modalTitle').textContent = 'Новий запис';
  document.getElementById('f_position').value = (prefill&&prefill.position)||'';
  document.getElementById('f_supplier').value = (prefill&&prefill.supplier)||'';
  document.getElementById('f_product').value = (prefill&&prefill.product)||'';
  document.getElementById('f_price').value = '';
  document.getElementById('f_status').value = 'sent';
  document.getElementById('f_email').value = (prefill&&prefill.email)||'';
  document.getElementById('f_note').value = '';
  document.getElementById('entryModal').style.display = 'flex';
  setTimeout(function(){document.getElementById('f_position').focus();},100);
}

function editEntry(id){
  var entries = getEntries();
  var entry = null;
  for(var i=0;i<entries.length;i++){ if(entries[i].id===id){entry=entries[i];break;} }
  if(!entry) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = 'Редагувати запис';
  document.getElementById('f_position').value = entry.position||'';
  document.getElementById('f_supplier').value = entry.supplier||'';
  document.getElementById('f_product').value = entry.product||'';
  document.getElementById('f_price').value = entry.price||'';
  document.getElementById('f_status').value = entry.status||'sent';
  document.getElementById('f_email').value = entry.email||'';
  document.getElementById('f_note').value = entry.note||'';
  document.getElementById('entryModal').style.display = 'flex';
}

function closeModal(){
  document.getElementById('entryModal').style.display = 'none';
  editingId = null;
}

function saveEntry(){
  var position = document.getElementById('f_position').value.trim();
  var supplier = document.getElementById('f_supplier').value.trim();
  if(!position||!supplier){ alert('Заповни Позицію і Постачальника!'); return; }
  var entries = getEntries();
  var oldDate = '';
  if(editingId){
    for(var i=0;i<entries.length;i++){
      if(entries[i].id===editingId){ oldDate=entries[i].date; break; }
    }
  }
  var entry = {
    id: editingId||('e'+Date.now()),
    date: editingId ? oldDate : new Date().toISOString(),
    position: position,
    supplier: supplier,
    product: document.getElementById('f_product').value.trim(),
    price: document.getElementById('f_price').value,
    status: document.getElementById('f_status').value,
    email: document.getElementById('f_email').value.trim(),
    note: document.getElementById('f_note').value.trim()
  };
  if(editingId){
    for(var j=0;j<entries.length;j++){
      if(entries[j].id===editingId){ entries[j]=entry; break; }
    }
  } else {
    entries.push(entry);
  }
  saveEntries(entries);
  closeModal();
  renderTracker();
  updateTrackerBadge();
}

function deleteEntry(id){
  if(!confirm('Видалити цей запис?')) return;
  var entries = getEntries().filter(function(e){return e.id!==id;});
  saveEntries(entries);
  renderTracker();
  updateTrackerBadge();
}

function updateTrackerBadge(){
  var entries = getEntries();
  var waiting = entries.filter(function(e){return e.status==='sent';}).length;
  var tab = document.getElementById('trackTab');
  if(!tab) return;
  if(waiting>0){
    tab.innerHTML = '&#128202; Трекер <span style="background:var(--err);color:white;border-radius:8px;padding:1px 6px;font-size:10px;margin-left:4px">'+waiting+'</span>';
  } else if(entries.length>0){
    tab.innerHTML = '&#128202; Трекер <span style="background:var(--ok);color:white;border-radius:8px;padding:1px 6px;font-size:10px;margin-left:4px">'+entries.length+'</span>';
  }
}

var _origSwTab = swTab;
swTab = function(tab, el){
  if(tab==='track'){
    document.querySelectorAll('.ptab').forEach(function(t){t.classList.remove('active');});
    el.classList.add('active');
    openTrackerFull();
    return;
  }
  _origSwTab(tab, el);
};

function quickAddToTracker(supplier, product, artikul, price){
  var pos = selItem ? selItem.n : '';
  openAddEntry({position:pos, supplier:supplier, product:product+(artikul?' / '+artikul:''), email:''});
  if(price) document.getElementById('f_price').value = price;
  openTrackerFull();
}


buildTree();
updateTrackerBadge();
</script>
</body>
</html>
